name: Build VSIX (temporary test build)

# Trigger manually from any branch via the Actions tab
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-vsix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm turbo build --filter=niivue

      - name: Package VSIX
        run: pnpm vsce package
        working-directory: ./apps/vscode

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: niivue-vscode-${{ github.sha }}
          path: apps/vscode/*.vsix
          retention-days: 7
